<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SkillScan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<div class="h-16 sm:h-20"></div>

<section class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-8 sm:py-10">

    <div class="bg-white shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-md">

        <h2 class="text-2xl sm:text-3xl font-bold text-center mb-2 leading-snug">
            Create Your <span class="text-indigo-600">SkillScan</span> Account
        </h2>

        <p class="text-gray-500 text-center mb-6 text-sm sm:text-base">
            Start your personalized career roadmap
        </p>

        <!-- STEP 1 -->
        <div id="signup-step">

            <form class="space-y-4 sm:space-y-5" onsubmit="return false;">

                <div>
                    <label class="block mb-1 font-medium text-sm sm:text-base">Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your name"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm sm:text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block mb-1 font-medium text-sm sm:text-base">Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm sm:text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block mb-1 font-medium text-sm sm:text-base">Password</label>
                    <input type="password" id="signup-password" placeholder="Create password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm sm:text-base focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <button type="button" onclick="sendOTP()"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold text-sm sm:text-base hover:bg-indigo-700 transition">
                    Send OTP
                </button>

            </form>
        </div>

        <!-- STEP 2 OTP -->
        <div id="otp-step" class="hidden">

            <div class="space-y-4 sm:space-y-5">

                <div>
                    <label class="block mb-1 font-medium text-sm sm:text-base">Enter OTP</label>
                    <input type="text" id="otp-input" placeholder="Enter 6-digit OTP" maxlength="6"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-center tracking-widest text-base sm:text-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <button onclick="verifyOTP()"
                    class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold text-sm sm:text-base hover:bg-green-700 transition">
                    Verify & Create Account
                </button>

                <p class="text-center text-xs sm:text-sm text-gray-500">
                    Didn't receive OTP?
                    <a href="#" onclick="resendOTP()" class="text-indigo-600 hover:underline">Resend</a>
                </p>

            </div>

        </div>

        <!-- Success Message -->
        <div id="success-step" class="hidden text-center">

            <div class="mb-4">
                <svg class="w-14 h-14 sm:w-16 sm:h-16 text-green-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>

            <h3 class="text-xl sm:text-2xl font-bold text-gray-800 mb-2">
                Account Created!
            </h3>

            <p class="text-gray-500 mb-4 text-sm sm:text-base">
                Your account has been verified successfully.
            </p>

            <a href="login.html"
                class="inline-block bg-indigo-600 text-white py-3 px-6 rounded-lg font-semibold text-sm sm:text-base hover:bg-indigo-700 transition">
                Login Now
            </a>

        </div>

        <p class="text-center mt-6 text-xs sm:text-sm">
            Already have an account?
            <a href="login.html" class="text-indigo-600 font-medium hover:underline">
                Login
            </a>
        </p>

    </div>

</section>

<!-- Error/Success Messages -->
<div id="message-box" class="fixed top-4 right-4 left-4 sm:left-auto z-50 hidden">
    <div id="message-content" class="p-4 rounded-lg shadow-lg max-w-sm"></div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api/auth';
    let currentEmail = '';

    function showMessage(message, isSuccess = true) {
        const messageBox = document.getElementById('message-box');
        const messageContent = document.getElementById('message-content');
        
        messageContent.textContent = message;
        messageContent.className = isSuccess 
            ? 'p-4 rounded-lg shadow-lg max-w-sm bg-green-100 border border-green-500 text-green-700'
            : 'p-4 rounded-lg shadow-lg max-w-sm bg-red-100 border border-red-500 text-red-700';
        
        messageBox.classList.remove('hidden');
        
        setTimeout(() => {
            messageBox.classList.add('hidden');
        }, 5000);
    }

    async function sendOTP() {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;

        if (!name || !email || !password) {
            showMessage('Please fill in all fields', false);
            return;
        }

        if (password.length < 6) {
            showMessage('Password must be at least 6 characters', false);
            return;
        }

        try {
            const response = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                currentEmail = email;
                document.getElementById('signup-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
                showMessage('OTP sent to your email!', true);
            } else {
                showMessage(data.message || 'Error sending OTP', false);
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('Failed to connect to server', false);
        }
    }

    async function verifyOTP() {
        const otp = document.getElementById('otp-input').value.trim();

        if (!otp || otp.length !== 6) {
            showMessage('Please enter a valid 6-digit OTP', false);
            return;
        }

        try {
            const response = await fetch(`${API_URL}/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, otp })
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('otp-step').classList.add('hidden');
                document.getElementById('success-step').classList.remove('hidden');
                showMessage('Account verified successfully!', true);
            } else {
                showMessage(data.message || 'Invalid OTP', false);
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('Failed to connect to server', false);
        }
    }

    async function resendOTP() {
        if (!currentEmail) {
            showMessage('Please try signing up again', false);
            return;
        }

        try {
            const response = await fetch(`${API_URL}/resend-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail })
            });

            const data = await response.json();

            if (response.ok) {
                showMessage('OTP resent to your email!', true);
            } else {
                showMessage(data.message || 'Failed to resend OTP', false);
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('Failed to connect to server', false);
        }
    }
</script>

</body>
</html>
