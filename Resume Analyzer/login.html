<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkillScan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<!-- Navbar Spacer -->
<div class="h-16 sm:h-20"></div>

<!-- Login Section -->
<section class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="bg-white shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-md">
        
        <h2 class="text-2xl sm:text-3xl font-bold text-center mb-2">
            Welcome Back to <span class="text-indigo-600">SkillScan</span>
        </h2>
        <p class="text-gray-500 text-center mb-6 text-sm sm:text-base">
            Login to continue your career journey
        </p>

        <form class="space-y-4 sm:space-y-5" onsubmit="return false;">

            <!-- Email -->
            <div>
                <label class="block mb-1 font-medium text-sm sm:text-base">Email</label>
                <input type="email" id="login-email" placeholder="Enter your email"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm sm:text-base">
            </div>

            <!-- Password -->
            <div>
                <label class="block mb-1 font-medium text-sm sm:text-base">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm sm:text-base">
            </div>

            <!-- Remember -->
            <div class="flex justify-between items-center text-xs sm:text-sm">
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="w-4 h-4">
                    Remember me
                </label>
                <a href="#" class="text-indigo-600 hover:underline">Forgot Password?</a>
            </div>

            <!-- Button -->
            <button onclick="login()"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition text-sm sm:text-base">
                Login
            </button>

        </form>

        <p class="text-center mt-6 text-xs sm:text-sm">
            Don't have an account?
            <a href="signup.html" class="text-indigo-600 font-medium hover:underline">
                Sign up
            </a>
        </p>

    </div>
</section>

<!-- Error/Success Messages -->
<div id="message-box" class="fixed top-4 right-4 left-4 sm:left-auto z-50 hidden">
    <div id="message-content" class="p-4 rounded-lg shadow-lg max-w-sm"></div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api/auth';

    function showMessage(message, isSuccess = true) {
        const messageBox = document.getElementById('message-box');
        const messageContent = document.getElementById('message-content');
        
        messageContent.textContent = message;
        messageContent.className = isSuccess 
            ? 'p-4 rounded-lg shadow-lg max-w-sm bg-green-100 border border-green-500 text-green-700'
            : 'p-4 rounded-lg shadow-lg max-w-sm bg-red-100 border border-red-500 text-red-700';
        
        messageBox.classList.remove('hidden');
        
        setTimeout(() => {
            messageBox.classList.add('hidden');
        }, 5000);
    }

    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        if (!email || !password) {
            showMessage('Please enter email and password', false);
            return;
        }

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('user', JSON.stringify(data.user));
                showMessage('Login successful! Redirecting...', true);
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showMessage(data.message || 'Login failed', false);
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('Failed to connect to server', false);
        }
    }
</script>

</body>
</html>
